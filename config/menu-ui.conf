# Layout do menu (dotfiles-menu.sh → scripts/dotfiles-menu-ui.sh)
#
# MENU_UI_COL_GAP — número de espaços entre cada par de colunas (padrão: 2).
#
# MENU_UI_WIDTH_* — largura mínima de cada coluna no printf (alinhar tabela).
#
# MENU_UI_HDR_* — texto do cabeçalho (linha acima da lista).

MENU_UI_COL_GAP=2

MENU_UI_WIDTH_NUM=2
MENU_UI_WIDTH_MARK=4
MENU_UI_WIDTH_FILE=20
MENU_UI_WIDTH_SOURCE=12
MENU_UI_WIDTH_LINK_STATUS=15
MENU_UI_WIDTH_ACTION=50

MENU_UI_HDR_NUM="#"
MENU_UI_HDR_MARK="[ ]"
MENU_UI_HDR_FILE="Name"
MENU_UI_HDR_SOURCE="source"
MENU_UI_HDR_LINK_STATUS="link status"
MENU_UI_HDR_ACTION="Action"
