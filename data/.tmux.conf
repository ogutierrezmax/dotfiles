# Lista de plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# CONFIGURANDO O AMBIENTE DEV-CHECK
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'npm "npm run dev" "npm run test:watch" "npm run format:watch" "npm run eslint:watch" "npm run typecheck:watch"'

# Configurações do Continuum
set -g @continuum-restore 'on'    # Restaura automaticamente a última sessão salva
set -g @continuum-save-interval '5' # Salva a cada 5 minutos

# Inicializa o gerenciador de plugins (mantenha esta linha no final)
run '~/.tmux/plugins/tpm/tpm'

# Para a janela que não está selecionada
set -g window-status-format "[ #W #I:#P#F ]"

# Para a janela que está ativa no momento (com o *)
set -g window-status-current-format "[ #W #I:#P#F ]"



set -g mouse on
bind h select-layout even-vertical
bind v select-layout even-horizontal
# Abre novos painéis no diretório atual e ajusta o layout
bind-key C-h split-window -v -c "#{pane_current_path}" \; select-layout even-vertical
bind-key C-v split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
bind-key C-k kill-pane



# source-file ~/.tmux.conf (sourcefile)
set-option -s command-alias[100] sourcefile='source-file ~/.tmux.conf; display-message "TMUX recarregado!"'
# encerrar server
set-option -s command-alias[101] 'kill=run-shell "tmux kill-server"'

# Limpar Janelas
set-option -s command-alias[102] 'clean=kill-window -a \; kill-pane -a'

